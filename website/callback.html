<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Successful - Autoposter AI</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: #1e293b; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); max-width: 500px; }
        .icon { font-size: 50px; color: #4ade80; margin-bottom: 20px; }
        h1 { margin-bottom: 15px; font-size: 24px; }
        p { color: #94a3b8; line-height: 1.6; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .logo-img { width: 40px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="" class="logo-img">
            <span style="font-weight: 700; font-size: 1.2rem;">Autoposter AI</span>
        </div>
        <div class="icon">✅</div>
        <h1>Authentication Successful!</h1>
        <p>Your TikTok account has been securely linked with Autoposter AI.</p>
        <p>You can now close this window and return to your dashboard to start automating your content.</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        if (code) {
            console.log("Auth Code:", code);
            // Kodu otomatik olarak yerel sunucuya gönder
            fetch(`http://localhost:4000/receive-code?code=${code}`)
                .then(response => response.json())
                .then(data => {
                    if(data.success) {
                        const pElement = document.querySelector('p');
                        pElement.innerHTML = "Your TikTok account has been securely linked.<br><br><span style='color:#4ade80;'><b>✅ Token automatically saved to your bot!</b></span>";
                    }
                })
                .catch(err => {
                    console.log("Yerel sunucuya ulaşılamadı. Sunucu açık mı?", err);
                });
        }
    </script>
</body>
</html>
